# Nginx: proxy staging.authenticity.id ke Docker app (port 8003)
# Simpan sebagai /etc/nginx/sites-available/staging-authenticity
# Aktifkan: sudo ln -s /etc/nginx/sites-available/staging-authenticity /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx

# Hanya IPv4 (hapus listen [::]:80 jika server tidak pakai IPv6)
server {
    listen 80;
    # listen [::]:80;   # comment jika error 97 (Address family not supported)
    server_name staging.authenticity.id;

    access_log /var/log/nginx/staging-authenticity-access.log;
    error_log  /var/log/nginx/staging-authenticity-error.log;

    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

