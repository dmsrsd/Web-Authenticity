# Nginx - Authenticity (CodeIgniter 3) - Ubuntu 22
# Simpan sebagai /etc/nginx/sites-available/authenticity
# Aktifkan: sudo ln -s /etc/nginx/sites-available/authenticity /etc/nginx/sites-enabled/
# Reload:   sudo nginx -t && sudo systemctl reload nginx

# Ganti domain dan path sesuai server
# Ganti /var/www/authenticity dengan path deploy Anda
# Ganti authenticity.id dengan domain Anda

server {
    listen 80;
    listen [::]:80;
    server_name authenticity.id www.authenticity.id;
    root /var/www/authenticity;

    index index.php index.html;
    charset utf-8;

    # Log
    access_log /var/log/nginx/authenticity-access.log;
    error_log  /var/log/nginx/authenticity-error.log;

    # CodeIgniter: route semua ke index.php (sama seperti .htaccess)
    location / {
        try_files $uri $uri/ /index.php/$uri$is_args$args;
    }

    # PHP
    location ~ \.php(?:$|/) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;   # Ubuntu 22: php8.1-fpm (ganti jika pakai 7.4: php7.4-fpm.sock)
        fastcgi_index index.php;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Blok akses ke file sensitif
    location ~* /\.(ht|git|env) {
        deny all;
    }
    location ~* ^/(application|system|\.git) {
        deny all;
    }

    # Static assets (opsional: cache)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

