# Authenticity - CodeIgniter 3
# Database: MySQL di host (WSL / Ubuntu server / AWS EC2)
# Jalankan: docker compose up -d
#
# Di host pastikan:
# - MySQL listening (sudo systemctl start mysql)
# - Database & user sudah ada, user boleh dari host manapun (lihat DEPLOY-EC2.md)
# - Di Linux/EC2: container ke host via extra_hosts host.docker.internal:host-gateway

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authenticity-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-127.0.0.1:8003}:80"
    # Di Linux (Ubuntu/EC2) host.docker.internal di-resolve ke host via host-gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-gridsf}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
    volumes:
      - .:/var/www/html
    networks:
      - authenticity-network

networks:
  authenticity-network:
    driver: bridge
