    <script type="text/javascript">
        function downloadimage() {
            var container = document.getElementById("screnshoot");
            html2canvas(container, { allowTaint: true }).then(function (canvas) {

                var link = document.createElement("a");
                document.body.appendChild(link);
                link.download = "test dev.jpg";
                link.href = canvas.toDataURL();
                link.target = '_blank';
                link.click();
                
            });
        }
        $(document).ready(function() {

            //$('.soundbar').hide();

            $(".sb-playpause").click(function() {
                var idaudio = $('#audio');
                var plnow = $('#pl-now').val();
                var pllist = $('#pl-list').val();
                $('.pl-' + plnow).trigger('click');
            });
            $('.sb-backward').click(function() {
                var idaudio = $('#audio');
                var plnow = $('#pl-now').val();
                var pllist = $('#pl-list').val();
                $('.sb-playpause').find('i').attr('class', 'fa fa-play');
                if ($('#suffle').val() == "0") {
                    var min = eval(plnow) - 1;
                    if (min < 1) {} else {
                        $('.pl-' + min).trigger('click');
                    }

                } else {
                    var rand = Math.floor(Math.random() * pllist) + 1;
                    $('.pl-' + rand).trigger('click');
                }

            });
            $('.sb-forward').click(function() {
                var idaudio = $('#audio');
                var plnow = $('#pl-now').val();
                var pllist = $('#pl-list').val();
                $('.sb-playpause').find('i').attr('class', 'fa fa-play');
                if ($('#suffle').val() == "0") {
                    var plus = eval(plnow) + 1;
                    if (plus > eval(pllist)) {} else {
                        $('.pl-' + plus).trigger('click');
                    }
                } else {
                    var rand = Math.floor(Math.random() * pllist) + 1;
                    $('.pl-' + rand).trigger('click')
                }
            });
            $('.onof').click(function() {
                var klas = $(this).attr('class');
                var type = $(this).attr('data-type');
                if (klas.indexOf("disabled") != -1) {
                    $(this).removeClass("disabled");
                    $('#' + type).val(1);
                } else {
                    $(this).addClass("disabled");
                    $('#' + type).val(0);
                }
            });

            load("0", 'ALL', 'ALL', 'ALL');

            function currentplay(band) {
                var dataform = new FormData();
                dataform.append('csrf_test_name', '4bd9c60c7c107692e55b328f615bf7c4');
                dataform.append('band', band);
                dataform.append('year', $('#season-year').val());
                $.ajax({
                    url: 'https://www.authenticity.id/soundroom/getBand',
                    type: "POST",
                    data: dataform,
                    dataType: "json",
                    contentType: false,
                    processData: false,
                    beforeSend: function() {

                    },
                    error: function() {
                        $('#currentPlay').html('Failed..!!');
                    },
                    success: function(e) {
                        if (e.status == "true") {
                            $('#currentPlay').html(e.html);
                            //soundbar(e.namaband,e.kota,e.img,e.loved);
                        } else {
                            // $('#currentPlay').html('No data..!!');
                            $('#currentPlay').html('Oops! Musik yang lo cari ngga ditemukan!');
                        }
                    }
                });

                }
                $(document).on("click", '.klikplaylist', function() {
                    var no = $(this).attr('data-no');
                    var band = $(this).attr('data-band');
                    var slug = $(this).attr('data-slug');
                    klik(band);
                    currentplay(slug);
        });
        $(document).ready(function() {
            function filterInit(filterID = null) {
                //
                if ($(`#filter${filterID}`).val() == 'vote') {
                    $(`#provinsi${filterID}`).hide();
                    $(`#kota${filterID}`).hide();
                }
                $(`#filter${filterID}`).change(function() {
                    var val = $(this).val();
                    if (val == "vote") {
                        $(`#provinsi${filterID}`).hide();
                        $(`#kota${filterID}`).hide();
                        $(`#load-more${filterID}`).show();
                        load("0", 'ALL', 'ALL', 'ALL');
                    } else {
                        $(`#provinsi${filterID}`).show();
                        $(`#kota${filterID}`).show();
                    }
                });
                $(`#kota${filterID}`).change(function() {
                    var next = 'ALL';
                    var kota = $(this).val();
                    load("0", kota, '12', next);
                });
                $(`#provinsi${filterID}`).change(function() {
                    var prov = $(this).val();
                    var dataform = new FormData();
                    dataform.append('csrf_test_name', '4bd9c60c7c107692e55b328f615bf7c4');
                    dataform.append('id', prov);
                    dataform.append('search', prov);
                    $.ajax({
                        url: 'https://www.authenticity.id/home/combocity',
                        type: "POST",
                        dataType: "json",
                        contentType: false,
                        processData: false,
                        data: dataform,
                        beforeSend: function() {
                            $('.overlay-all').show();
                        },
                        error: function() {
                            $('.overlay-all').hide();
                            alert('Failed..!!');
                        },
                        success: function(e) {
                            $('.overlay-all').hide();
                            $(`#kota${filterID} option`).remove();
                            $(`#kota${filterID}`).append($("<option></option>").attr("value", "").text("--"));
                            var dats = e.data;
                            $.each(dats, function(i, item) {
                                var ids = item.id_kota;
                                var kotas = item.kota;
                                $(`#kota${filterID}`).append($("<option></option>").attr("value", ids).text(kotas));
                            });
                        }
                    });


                    dataform.append('kota', $('#kota1').val());
                    $.ajax({
                        url: 'https://www.authenticity.id/soundroom/getPlaylist',
                        type: "POST",
                        data: dataform,
                        dataType: "json",
                        contentType: false,
                        processData: false,
                        beforeSend: function() {

                        },
                        error: function() {
                            $('#listtableplay').html('Failed..!!');
                        },
                        success: function(e) {
                            if (e.status == "true") {
                                $('#listtableplay').html(e.html);
                                // if(ke!='0'){
                                // 	$('.idpl-'+ke).trigger('click');
                                // }else{
                                // 	$('.bp1').trigger('click');
                                // }
                                $('.bp1').trigger('click');
                                $('#pl-list').val(e.pl);
                                $('#pl-now').val('1');
                                $('#pl-done').val('0');
                                //$('.soundbar').hide();
                                pauseAll();
                            } else {
                                // $('#listtableplay').html('No data..!!');
                                $('#listtableplay').html('Oops! Musik yang lo cari ngga ditemukan!');
                                $('#currentPlay').html('');
                            }
                        }
                    });

                });
            }
            filterInit(1);

            function filterGallery(filterID = null) {
                //
                if ($(`#filter${filterID}`).val() == 'vote') {
                    $(`#provinsi${filterID}`).hide();
                    $(`#kota${filterID}`).hide();
                }
                $(`#filter${filterID}`).change(function() {
                    var val = $(this).val();
                    if (val == "vote") {
                        $(`#provinsi${filterID}`).hide();
                        $(`#kota${filterID}`).hide();
                        $(`#load-more${filterID}`).show();
                        loadGallery("0", '', "1", 'ALL');
                    } else {
                        $(`#provinsi${filterID}`).show();
                        $(`#kota${filterID}`).show();
                    }
                });
                $(`#kota${filterID}`).change(function() {
                    var next = 'ALL';
                    var kota = $(this).val();
                    loadGallery("0", kota, "0", next);
                });
                $(`#provinsi${filterID}`).change(function() {
                    var prov = $(this).val();
                    var dataform = new FormData();
                    dataform.append('csrf_test_name', '4bd9c60c7c107692e55b328f615bf7c4');
                    dataform.append('id', prov);
                    dataform.append('search', prov);
                    $.ajax({
                        url: 'https://www.authenticity.id/home/combocity',
                        type: "POST",
                        dataType: "json",
                        contentType: false,
                        processData: false,
                        data: dataform,
                        beforeSend: function() {
                            $('.overlay-all').show();
                        },
                        error: function() {
                            $('.overlay-all').hide();
                            alert('Failed..!!');
                        },
                        success: function(e) {
                            $('.overlay-all').hide();
                            $(`#kota${filterID} option`).remove();
                            $(`#kota${filterID}`).append($("<option></option>").attr("value", "").text("--"));
                            var dats = e.data;
                            $.each(dats, function(i, item) {
                                var ids = item.id_kota;
                                var kotas = item.kota;
                                $(`#kota${filterID}`).append($("<option></option>").attr("value", ids).text(kotas));
                            });
                        }
                    });


                    var data_page = $('.btn-loadmore').attr('data-page');
                    var data_filter = $('#kota2').val();
                    dataform.append('data_page', '0');
                    dataform.append('data_filter', '');
                    dataform.append('year', $('#season-year').val());
                    $.ajax({
                        url: 'https://www.authenticity.id/soundroom/getGallery',
                        type: "POST",
                        data: dataform,
                        dataType: "json",
                        contentType: false,
                        processData: false,
                        beforeSend: function() {

                        },
                        error: function() {
                            $('.participant-list').html('Failed..!!');
                        },
                        success: function(e) {
                            if (e.status == "true") {
                                $('.participant-list').html(e.html);
                                $('.btn-loadmore').attr('data-page', e.next_page);
                                if (e.next_page == '') {
                                    $('.btn-loadmore').remove();
                                }
                            } else {
                                // $('.participant-list').html('No data..!!');
                                $('.participant-list').html('Oops! Musik yang lo cari ngga ditemukan!');
                                $('.btn-loadmore').hide();
                            }
                        }
                    });

                });
            }
            filterGallery(2);
        });
        $('.tes').click(function() {
            var myElement = document.getElementById('play-30');

        });
